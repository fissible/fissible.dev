<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Station agency cost comparison</title>
  <desc id="desc">A simple agency cost comparison graphic contrasting per-site CMS licensing with one Station install serving multiple tenants.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="80" x2="1520" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F7F3"/>
      <stop offset="1" stop-color="#E9EFE4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1C7C54"/>
      <stop offset="1" stop-color="#245B4A"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1E2B21" flood-opacity="0.12"/>
    </filter>
    <style>
      .eyebrow { font: 700 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.14em; text-transform: uppercase; fill: #1C7C54; }
      .headline { font: 700 54px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #162118; }
      .subhead { font: 400 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4D5B50; }
      .label { font: 700 28px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18231A; }
      .body { font: 400 19px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #58655A; }
      .small { font: 700 17px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #5F6C61; }
      .invert { fill: #F7FBF7; }
      .invertBody { fill: #DCEADF; }
      .bigMoney { font: 700 64px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #162118; }
      .bigMoneyInvert { font: 700 64px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F7FBF7; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="120" y="118" class="eyebrow">Agency Economics</text>
  <text x="120" y="184" class="headline">Five client sites should not mean five CMS installs.</text>
  <text x="120" y="226" class="subhead">A simple comparison asset for the multi-tenancy pitch.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="300" width="610" height="470" rx="32" fill="#FFFFFF" stroke="#D4DED0" stroke-width="2"/>
    <text x="164" y="360" class="small">Typical Per-Site CMS</text>
    <text x="164" y="420" class="label">License math multiplies with every customer site.</text>
    <text x="164" y="506" class="bigMoney">$350 × 5</text>
    <text x="164" y="548" class="body">Five client sites means five licenses, plus five installs to manage.</text>
    <text x="164" y="614" class="body">• Separate app instances</text>
    <text x="164" y="654" class="body">• Repeated upgrades and environment setup</text>
    <text x="164" y="694" class="body">• More operational sprawl as the client list grows</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="264" width="710" height="542" rx="36" fill="url(#accent)"/>
    <text x="818" y="332" class="small" fill="#DCEADF">Station</text>
    <text x="818" y="394" class="label invert">One install can serve multiple isolated tenant sites.</text>
    <text x="818" y="492" class="bigMoneyInvert">1 install, 5 tenants</text>
    <text x="818" y="538" class="body invertBody">The point is not only license math. It is one operational surface, one approval model, and isolated tenant boundaries.</text>
    <rect x="818" y="610" width="286" height="92" rx="20" fill="#F6FBF7" fill-opacity="0.14" stroke="#9FD0B5" stroke-width="1.5"/>
    <text x="848" y="662" class="label invert">Multi-tenant</text>
    <text x="848" y="690" class="body invertBody">Each customer isolated</text>
    <rect x="1146" y="610" width="286" height="92" rx="20" fill="#F6FBF7" fill-opacity="0.14" stroke="#9FD0B5" stroke-width="1.5"/>
    <text x="1176" y="662" class="label invert">Approval-first</text>
    <text x="1176" y="690" class="body invertBody">Shared workflow model</text>
  </g>
</svg>
