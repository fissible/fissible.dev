<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Station build versus buy card</title>
  <desc id="desc">A comparison card showing the tradeoffs between building approval workflow in house and buying Station.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="80" x2="1520" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F7F5"/>
      <stop offset="1" stop-color="#EBEFE8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1C7C54"/>
      <stop offset="1" stop-color="#245B4A"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#1E2B21" flood-opacity="0.12"/>
    </filter>
    <style>
      .eyebrow { font: 700 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.14em; text-transform: uppercase; fill: #1C7C54; }
      .headline { font: 700 54px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #162118; }
      .subhead { font: 400 24px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4D5B50; }
      .label { font: 700 30px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #18231A; }
      .body { font: 400 19px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #58655A; }
      .small { font: 700 17px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.08em; text-transform: uppercase; fill: #5F6C61; }
      .invert { fill: #F7FBF7; }
      .invertBody { fill: #DCEADF; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="120" y="118" class="eyebrow">Build Vs Buy</text>
  <text x="120" y="184" class="headline">The expensive part is not the first approval rule.</text>
  <text x="120" y="226" class="subhead">It is everything you own after the first one ships.</text>

  <g filter="url(#shadow)">
    <rect x="120" y="300" width="610" height="470" rx="32" fill="#FFFFFF" stroke="#D4DED0" stroke-width="2"/>
    <text x="164" y="360" class="small">Build In House</text>
    <text x="164" y="420" class="label">You own the edge cases.</text>

    <text x="164" y="486" class="body">• Role drift and permission exceptions</text>
    <text x="164" y="530" class="body">• Scheduling guards and publish-state logic</text>
    <text x="164" y="574" class="body">• Audit trail requirements</text>
    <text x="164" y="618" class="body">• Multi-tenant separation and host routing</text>
    <text x="164" y="662" class="body">• Ongoing maintenance every time requirements change</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="770" y="264" width="710" height="542" rx="36" fill="url(#accent)"/>
    <text x="818" y="332" class="small" fill="#DCEADF">Buy Station</text>
    <text x="818" y="394" class="headline" fill="#F7FBF7" style="font-size:46px">Start with the constraints already productized.</text>
    <text x="818" y="452" class="subhead" fill="#DCEADF">Approval-first workflow, isolated tenants, auditability, and self-hosted control in one install.</text>

    <rect x="818" y="516" width="614" height="72" rx="18" fill="#F6FBF7" fill-opacity="0.14" stroke="#9FD0B5" stroke-width="1.5"/>
    <text x="848" y="560" class="label invert">Draft → Submit → Approve → Publish</text>

    <rect x="818" y="612" width="286" height="92" rx="20" fill="#F6FBF7" fill-opacity="0.14" stroke="#9FD0B5" stroke-width="1.5"/>
    <text x="848" y="664" class="label invert">Self-hosted</text>
    <text x="848" y="692" class="body invertBody">Own the data path</text>

    <rect x="1146" y="612" width="286" height="92" rx="20" fill="#F6FBF7" fill-opacity="0.14" stroke="#9FD0B5" stroke-width="1.5"/>
    <text x="1176" y="664" class="label invert">Multi-tenant</text>
    <text x="1176" y="692" class="body invertBody">Avoid per-site CMS sprawl</text>
  </g>
</svg>
