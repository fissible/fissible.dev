<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Fissible Logo</title>
  <desc>Stylized Fissible F mark in violet and indigo gradients.</desc>
  <defs>
    <linearGradient id="fissiblePrimary" x1="188" y1="146" x2="792" y2="804" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.45" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="fissibleHighlight" x1="214" y1="160" x2="740" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C4B5FD" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="fissibleShadow" x1="250" y1="720" x2="385" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <filter id="softShadow" x="120" y="100" width="780" height="850" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#312E81" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Main vertical sweep -->
    <path d="M210 807C210 646 215 479 238 350C262 214 343 146 489 146H744C789 146 825 182 825 227C825 272 789 308 744 308H493C434 308 402 337 392 397C381 462 377 549 377 641V801C377 847 340 884 294 884H293C247 884 210 853 210 807Z" fill="url(#fissiblePrimary)"/>

    <!-- Top arm -->
    <path d="M382 146H748C793 146 829 182 829 227C829 272 793 308 748 308H350C305 308 269 272 269 227C269 182 305 146 350 146H382Z" fill="url(#fissibleHighlight)"/>

    <!-- Middle arm -->
    <path d="M360 422H670C713 422 748 457 748 500C748 543 713 578 670 578H332C289 578 254 543 254 500C254 457 289 422 332 422H360Z" fill="url(#fissiblePrimary)" opacity="0.96"/>

    <!-- Lower stem bulb -->
    <path d="M210 724C210 676 249 637 297 637C345 637 384 676 384 724V802C384 849 346 887 299 887H296C248 887 210 849 210 802V724Z" fill="url(#fissibleShadow)"/>

    <!-- Subtle translucent intersection for layered brand feel -->
    <path d="M254 500C254 457 289 422 332 422H466C423 448 394 492 384 552L381 578H332C289 578 254 543 254 500Z" fill="#A78BFA" opacity="0.28"/>
  </g>
</svg>
